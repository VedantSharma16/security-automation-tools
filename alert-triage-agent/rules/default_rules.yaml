# Default detection rules for the Alert Triage Agent.
#
# Each rule is a regex applied (case-insensitively) to a single log line.
# severity: low | medium | high | critical
# mitre_technique: an ATT&CK technique ID, used to group findings in the
#   report and to give recruiters/analysts something concrete to click on.

rules:
  - id: AUTH-001
    name: Repeated failed SSH login
    pattern: 'Failed password for .* from'
    severity: medium
    mitre_technique: "T1110 - Brute Force"
    description: A single failed SSH authentication attempt. Correlate volume/rate downstream.

  - id: AUTH-002
    name: Invalid SSH user attempted
    pattern: 'Failed password for invalid user'
    severity: high
    mitre_technique: "T1110.001 - Password Guessing"
    description: Login attempted against a username that does not exist on the host, typical of automated scanning.

  - id: AUTH-003
    name: Accepted SSH login after prior failures
    pattern: 'Accepted (password|publickey) for'
    severity: low
    mitre_technique: "T1078 - Valid Accounts"
    description: Successful authentication. Benign alone, notable when preceded by AUTH-001/002 on the same account.

  - id: PRIV-001
    name: sudo command executed
    pattern: '\bsudo:\s'
    severity: low
    mitre_technique: "T1548.003 - Sudo and Sudo Caching"
    description: Privilege escalation via sudo. Expected in normal operation; watch for unusual commands or users.

  - id: PRIV-002
    name: New local user account created
    pattern: '(useradd|adduser|net user .* /add)'
    severity: high
    mitre_technique: "T1136 - Create Account"
    description: A new local account was created, a common persistence technique.

  - id: TOOL-001
    name: Credential dumping tool referenced
    pattern: '(mimikatz|secretsdump|hashdump|dumpsec|lsass\.exe.*dump)'
    severity: critical
    mitre_technique: "T1003 - OS Credential Dumping"
    description: Process or command line referencing a known credential-dumping tool or technique.

  - id: TOOL-002
    name: Offensive C2/post-exploitation framework referenced
    pattern: '(cobaltstrike|cobalt strike|metasploit|meterpreter|rubeus|bloodhound|impacket|sharpdump|sharpwmi|evil-?winrm)'
    severity: critical
    mitre_technique: "T1588.002 - Tool"
    description: Reference to a well-known red-team / adversary post-exploitation framework.

  - id: TOOL-003
    name: Lateral movement / remote execution tool referenced
    pattern: '(psexec|crackmapexec|wmic\.exe|evil-?winrm)'
    severity: high
    mitre_technique: "T1021 - Remote Services"
    description: Tooling commonly used to execute commands on remote hosts after initial access.

  - id: TOOL-004
    name: Password spraying / brute-force tool referenced
    pattern: '(hydra|medusa|crackmapexec|kerberoast)'
    severity: high
    mitre_technique: "T1110 - Brute Force"
    description: Command-line reference to an automated credential attack tool.

  - id: TOOL-005
    name: Reconnaissance / scanning tool referenced
    pattern: '(nmap|masscan|gobuster|dirbuster|sqlmap|nessus|nikto)'
    severity: medium
    mitre_technique: "T1595 - Active Scanning"
    description: Active scanning or exploitation-discovery tooling observed on or from the host.

  - id: TOOL-006
    name: Traffic sniffing / interception tool referenced
    pattern: '(tcpdump|wireshark|ettercap|responder\.py|responder\b)'
    severity: high
    mitre_technique: "T1040 - Network Sniffing"
    description: Packet capture or on-path interception tooling, potentially used for credential harvesting.

  - id: EXEC-001
    name: Encoded/obfuscated PowerShell invocation
    pattern: 'powershell(\.exe)?.*(-enc|-encodedcommand|-e\s+[A-Za-z0-9+/=]{20,})'
    severity: critical
    mitre_technique: "T1059.001 - PowerShell"
    description: PowerShell invoked with an encoded command, a common obfuscation and defense-evasion pattern.

  - id: EXEC-002
    name: cmd.exe invoked with suspicious flags
    pattern: 'cmd(\.exe)?\s+/c\s'
    severity: low
    mitre_technique: "T1059.003 - Windows Command Shell"
    description: Command shell spawned non-interactively, common in both admin scripts and malware droppers.

  - id: EVADE-001
    name: Windows event log cleared
    pattern: '(wevtutil\s+cl|clear-eventlog|Clear-Log)'
    severity: critical
    mitre_technique: "T1070.001 - Clear Windows Event Logs"
    description: A host's own security/event log was cleared, a strong anti-forensics indicator.

  - id: EVADE-002
    name: Living-off-the-land download utility invoked
    pattern: '(certutil\s+.*-urlcache|bitsadmin\s+.*\/transfer)'
    severity: high
    mitre_technique: "T1105 - Ingress Tool Transfer"
    description: A built-in OS utility used to fetch a remote file, frequently abused to bypass allow-listing.

  - id: PERSIST-001
    name: Scheduled task created or modified
    pattern: 'schtasks\s+.*\/create'
    severity: medium
    mitre_technique: "T1053.005 - Scheduled Task/Job"
    description: A new scheduled task was created, a common persistence mechanism.

  - id: PROXY-001
    name: Proxy/anonymization tooling referenced
    pattern: '(proxychains|proxycap|fakenet)'
    severity: medium
    mitre_technique: "T1090 - Proxy"
    description: Traffic proxying/anonymization tooling referenced in process or command line data.

  - id: NETCAT-001
    name: Netcat / raw listener referenced
    pattern: '(\bnc\.exe\b|\bnetcat\b|\bncat\b).*(-l|-e|-p)'
    severity: high
    mitre_technique: "T1059 - Command and Scripting Interpreter"
    description: Netcat invoked with listener/execute flags, frequently used to establish reverse or bind shells.
